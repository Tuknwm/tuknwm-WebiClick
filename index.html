<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrilifePlus</title>
  <link rel="icon" type="image/png" href="Img/Logo6.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
    }

    .loading-page {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #000;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      clip-path: url(#curveClip);
      font-family: 'Montserrat', sans-serif;
      color: white;
    }

    .info-panel {
      position: absolute;
      top: 25px; left: 25px;
      z-index: 1000;
    }

    #clock {
      font-size: 24px;
      font-weight: 900;
    }

    #date {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .bottom-left-text {
      position: absolute;
      bottom: 25px; left: 25px;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.6;
      z-index: 1000;
    }

    .emoji-bottom-right {
      position: absolute;
      bottom: 25px; right: 25px;
      font-size: 24px;
      font-weight: 900;
      opacity: 0;
      transform: translateY(20px);
      z-index: 1000;
      color: white;
    }

    .loader-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .clip-svg {
      width: 0; height: 0;
      position: absolute;
    }

    .main-svg {
      width: 100%;
      max-width: 900px;
      height: auto;
      overflow: visible;
    }

    .text-path {
      fill: transparent;
      stroke: #333;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .char-fill {
      fill: #FFFFFF;
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
    }

    .latin-stroke {
      fill: transparent;
      stroke: rgba(255, 255, 255, 0.3);
      stroke-width: 1.5;
      font-size: 150px;
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <svg class="clip-svg">
    <defs>
      <clipPath id="curveClip" clipPathUnits="objectBoundingBox">
        <path id="curvePath" d="M 0,0 L 1,0 L 1,1 Q 0.5,1 0,1 Z" />
      </clipPath>
    </defs>
  </svg>

  <div class="loading-page">
    <div class="info-panel">
      <div id="date">Memuat...</div>
      <div id="clock">00:00:00</div>
    </div>
    <div class="bottom-left-text">Tuknwn</div>
    <div id="emoji-exit" class="emoji-bottom-right">＞︿＜</div>

    <div class="loader-container">
      <svg class="main-svg" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(500, 150)">
          <text id="kurokyu-stroke" text-anchor="middle" dominant-baseline="middle" class="latin-stroke">KUROKYU</text>
        </g>
        <g id="text-group" transform="translate(500, 150)">
          <g class="char-unit left-side" transform="translate(-180, 0)">
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="text-path">く</text>
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="char-fill">く</text>
          </g>
          <g class="char-unit left-side" transform="translate(-90, 0)">
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="text-path">ろ</text>
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="char-fill">ろ</text>
          </g>
          <g class="char-unit right-side" transform="translate(0, 0)">
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="text-path">き</text>
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="char-fill">き</text>
          </g>
          <g class="char-unit right-side" transform="translate(90, 0)">
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="text-path">ゅ</text>
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="char-fill">ゅ</text>
          </g>
          <g class="char-unit right-side" transform="translate(180, 0)">
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="text-path">う</text>
            <text text-anchor="middle" dominant-baseline="middle" font-size="90" font-weight="bold" class="char-fill">う</text>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Skip loading if already visited this session
    if (sessionStorage.getItem('hasVisited')) {
      window.location.replace('/landing');
    }

    function startClock() {
      const update = () => {
        const now = new Date();
        const clockEl = document.getElementById('clock');
        const dateEl  = document.getElementById('date');
        if (clockEl) clockEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        if (dateEl)  dateEl.textContent  = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      };
      update();
      setInterval(update, 1000);
    }

    function startAnimation(onComplete) {
      const tl          = gsap.timeline({ onComplete });
      const latinStroke = document.getElementById('kurokyu-stroke');
      const curvePath   = document.getElementById('curvePath');
      if (!latinStroke || !curvePath) return;

      const pathLength = latinStroke.getComputedTextLength() * 2;
      gsap.set(latinStroke, { strokeDasharray: pathLength, strokeDashoffset: pathLength, opacity: 0 });
      gsap.set('#text-group', { scale: 2, opacity: 0 });

      tl.to('#text-group', { scale: 1, opacity: 1, duration: 1.5, ease: 'expo.out' });
      tl.fromTo('.text-path',
        { strokeDasharray: 450, strokeDashoffset: 450 },
        { strokeDashoffset: 0, duration: 1.5, stagger: 0.1, ease: 'power2.inOut' },
        '-=0.5'
      );

      const flicker = (el, delay) =>
        gsap.timeline({ delay })
          .to(el, { opacity: 0.7, duration: 0.05 })
          .to(el, { opacity: 0.1, duration: 0.04 })
          .to(el, { opacity: 1,   duration: 0.1, filter: 'drop-shadow(0 0 25px #fff)' });

      tl.addLabel('neon');
      document.querySelectorAll('.left-side .char-fill').forEach((f, i) => {
        tl.add(flicker(f, i * 0.1), 'neon');
      });
      Array.from(document.querySelectorAll('.right-side .char-fill')).reverse().forEach((f, i) => {
        tl.add(flicker(f, i * 0.1), 'neon');
      });

      tl.addLabel('latin', '-=0.3');
      tl.to(latinStroke, {
        opacity: 1, duration: 0.1,
        onComplete: () => gsap.to(latinStroke, { opacity: 0.1, duration: 0.05, yoyo: true, repeat: 1 })
      }, 'latin');
      tl.to(latinStroke, { strokeDashoffset: 0, duration: 2.5, ease: 'power3.inOut' }, 'latin');
      tl.to(latinStroke, { opacity: 0.15, duration: 1.5 }, '-=0.5');

      const emoji = document.getElementById('emoji-exit');
      if (emoji) tl.to(emoji, { opacity: 1, y: 0, duration: 0.5, ease: 'back.out' }, '+=0.5');

      tl.addLabel('exit', '+=1.5');
      tl.to('.info-panel, .bottom-left-text, #emoji-exit, .loader-container',
        { opacity: 0, y: -20, duration: 0.5, stagger: 0.05 }, 'exit'
      );
      tl.to(curvePath, {
        attr: { d: 'M 0,0 L 1,0 L 1,0 Q 0.5,-0.2 0,0 Z' },
        duration: 1.5, ease: 'expo.inOut'
      }, 'exit');
    }

    startClock();
    startAnimation(() => {
      setTimeout(() => {
        sessionStorage.setItem('hasVisited', '1');
        window.location.replace('/landing');
      }, 500);
    });
  </script>
</body>
</html>
